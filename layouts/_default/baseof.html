<!DOCTYPE html>
<html lang="en">

{{ partial "head.html" . }}

<body class="home-template grey lighten-2">
    <!-- Pre-loader -->
    <div class="loader preloader-wrapper small" aria-hidden="true">
        <div class="spinner-layer spinner-red-only">
            <div class="circle-clipper left">
                <div class="circle"></div>
            </div>
            <div class="gap-patch">
                <div class="circle"></div>
            </div>
            <div class="circle-clipper right">
                <div class="circle"></div>
            </div>
        </div>
    </div>
    <!-- /Pre-loader -->
    <!-- Back to top link -->
    <a href="#" class="btn-floating btn-small waves-effect waves-light deep-orange back-to-top" aria-label="Back to top"><i class="material-icons" aria-hidden="true">keyboard_capslock</i></a>
    <!-- /Back to top link -->

    <!-- Header -->
    {{ partial "header.html" . }}
    <!-- /Header -->

    <main>
        <div class="row">
            {{ block "main" . }}{{ end }}
        </div>
    </main>

    <!-- Footer -->
    {{ partial "footer.html" . }}
    <!-- /Footer -->

    {{ partial "scripts.html" . }}
</body>

</html>
