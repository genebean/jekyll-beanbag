{{ $author := .author }}
{{ $site := .site }}
{{ $instance := $author.mastodon.instance | default $site.Params.mastodon.instance }}
{{ $username := $author.mastodon.username | default $site.Params.mastodon.username }}
{{ if and $instance $username }}
<iframe
    class="lazy-iframe"
    allowfullscreen sandbox="allow-top-navigation allow-scripts" width="100%" height="1000"
    data-src="https://www.mastofeed.com/apiv2/feed?userurl=https%3A%2F%2F{{ $instance }}%2Fusers%2F{{ $username }}&theme=light&size=80&header=false&replies=false&boosts=false">
</iframe>
{{ end }}
