baseURL = 'https://beanbag.technicalissues.us/'
languageCode = 'en-us'
title = 'The Comfy Seat'
enableGitInfo = true

[frontmatter]
  lastmod = ["lastmod", ":git", ":fileModTime"]
[pagination]
  pagerSize = 5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    tabWidth = 4

[params]
  description = 'The chair I sit in to geek out'
  email = 'gene@technicalissues.us'
  logo = '/assets/images/Front-Row.png'
  author = 'gene'

[params.mastodon]
  instance = 'fosstodon.org'
  username = 'genebean'

[[params.header.links]]
  label = 'GitHub'
  url = 'https://github.com/genebean'

[[params.header.links]]
  label = 'Vagrant Boxes'
  url = 'https://app.vagrantup.com/genebean'

[[params.footer.links]]
  label = 'Mastodon'
  url = 'https://fosstodon.org/@genebean'
